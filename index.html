<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Record">
<title>Record</title>
<style>
:root {
  --bg:      #FFFFFF;
  --panel:   #F2F2F7;
  --border:  #CDE9A0;
  --accent:  #4CAF50;
  --accent2: #D6F0B2;
  --text:    #1C1C1E;
  --muted:   #8E8E93;
  --red:     #FF3B30;
  --blue:    #007AFF;
  --orange:  #FF9500;
  --radius:  14px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, "PingFang SC", "SF Pro Text", sans-serif;
  background: var(--bg); color: var(--text);
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── Topbar ── */
.topbar {
  background: var(--bg);
  padding: calc(var(--safe-top) + 12px) 20px 10px;
  border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.topbar-title { font-size: 24px; font-weight: 700; color: var(--accent); letter-spacing: -.5px; }
.topbar-sub   { font-size: 12px; color: var(--muted); }

/* ── Screens ── */
.screens { flex: 1; overflow: hidden; position: relative; }
.screen {
  position: absolute; inset: 0; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px 0;
  opacity: 0; pointer-events: none;
  transform: translateY(6px);
  transition: opacity .2s ease, transform .2s ease;
}
.screen.active { opacity: 1; pointer-events: all; transform: none; }
.pb { height: 24px; }

/* ── Navbar ── */
.navbar {
  background: var(--bg); border-top: 1.5px solid var(--border);
  display: flex; padding-bottom: var(--safe-bot); flex-shrink: 0;
}
.nav-btn {
  flex: 1; border: none; background: none;
  padding: 8px 2px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; color: var(--muted);
  font-size: 10px; font-family: inherit; font-weight: 600; transition: color .15s;
}
.nav-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.nav-icon svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
.nav-btn.active { color: var(--accent); }
.nav-btn.add-btn .nav-icon {
  width: 48px; height: 34px; background: var(--orange);
  border-radius: 12px; margin-top: -4px;
}
.nav-btn.add-btn svg { stroke: #fff; width: 20px; height: 20px; }
.nav-btn.add-btn > span { color: var(--muted); }
.nav-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--panel); overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.nav-avatar img { width:100%; height:100%; object-fit:cover; }

/* ── Stat cards ── */
.stats-row { display: flex; gap: 10px; margin-bottom: 14px; }
.stat-card { flex:1; background:var(--panel); border-radius:var(--radius); padding:14px 10px; text-align:center; }
.stat-val { font-size: 24px; font-weight: 700; color: var(--accent); }
.stat-key { font-size: 11px; color: var(--muted); margin-top: 2px; }
.section-label {
  font-size: 12px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: .6px; margin: 0 2px 8px;
}

/* ── Record rows (swipeable) ── */
.rec-wrap { position: relative; overflow: hidden; border-radius: 12px; margin-bottom: 8px; }
.rec-actions {
  position: absolute; right: 0; top: 0; bottom: 0;
  display: flex; transform: translateX(100%); transition: transform .25s ease;
}
.rec-wrap.swiped .rec-actions { transform: translateX(0); }
.action-btn {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; padding: 0 18px;
  border: none; cursor: pointer; font-size: 11px;
  font-family: inherit; font-weight: 600; color: #fff;
}
.action-edit   { background: var(--blue); }
.action-delete { background: var(--red); }
.rec-row {
  background: var(--panel); display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; position: relative; z-index: 1;
  touch-action: pan-y; user-select: none;
  transition: transform .25s ease;
}
.rec-wrap.swiped .rec-row { transform: translateX(-148px); }
.rec-cover {
  width: 52px; height: 52px; border-radius: 9px;
  background: var(--accent2); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.rec-cover img { width:100%; height:100%; object-fit:cover; }
.rec-main { flex: 1; min-width: 0; }
.rec-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rec-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.type-tag  {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 99px; margin-top: 4px;
  background: var(--accent2); color: var(--accent);
}
.rec-right { text-align: right; flex-shrink: 0; }
.rec-price { font-size: 16px; font-weight: 700; color: var(--accent); }
.rec-seat  { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── Form fields ── */
.field-label {
  font-size: 11px; color: var(--muted); font-weight: 700;
  margin: 16px 0 5px 2px; text-transform: uppercase; letter-spacing: .5px;
}
input[type=text], input[type=number], input[type=datetime-local], textarea {
  width: 100%; border: 1.8px solid #E5E5EA;
  border-radius: 10px; padding: 12px 14px;
  font-size: 16px; font-family: inherit;
  background: var(--bg); color: var(--text);
  outline: none; -webkit-appearance: none; appearance: none;
  transition: border-color .15s;
}
input:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: none; height: 72px; line-height: 1.5; }

/* ── Add hero (cover left, fields right) ── */
.add-hero {
  display: flex; align-items: stretch; gap: 14px; margin-bottom: 6px;
}
.cover-pick {
  width: 140px; flex-shrink: 0; height: 186px;
  border-radius: 12px; border: 2px dashed #C7C7CC;
  background: var(--panel);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: visible;
}
.cover-pick input[type=file] {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0; z-index: 10;
  cursor: pointer; border-radius: 12px;
}
.cover-pick .cover-img-wrap {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  border-radius: 10px; overflow: hidden;
  pointer-events: none;
}
.cover-pick .cover-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover; display: none;
}
.cover-ph { position: relative; z-index: 1; display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--muted); font-size:11px; font-weight:600; padding:12px; text-align:center; }
.cover-ph { display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--muted); font-size:11px; font-weight:600; padding:12px; text-align:center; }
/* Right column: label + name input stacked, then label + artist input */
.hero-fields {
  flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 0;
}
.hero-field-label {
  font-size: 15px; font-weight: 700; color: var(--text);
  margin-bottom: 6px; margin-top: 16px;
}
.hero-field-label:first-child { margin-top: 0; }
.show-name-input, .artist-hero-input {
  width: 100%;
  border: none; border-bottom: 1.8px solid #E5E5EA;
  border-radius: 0; padding: 8px 2px;
  font-family: inherit; color: var(--text);
  background: transparent; outline: none;
  transition: border-color .15s;
}
.show-name-input { font-size: 18px; font-weight: 700; }
.show-name-input::placeholder { color: #C7C7CC; font-weight: 400; font-size: 16px; }
.show-name-input:focus { border-color: var(--accent); }
.artist-hero-input { font-size: 15px; font-weight: 500; }
.artist-hero-input::placeholder { color: #C7C7CC; font-weight: 400; }
.artist-hero-input:focus { border-color: var(--accent); }

/* ── Type buttons ── */
.type-row { display: flex; gap: 8px; }
.type-btn {
  flex: 1; padding: 10px 4px;
  border-radius: 10px; border: 1.8px solid #E5E5EA;
  background: var(--panel); color: var(--muted);
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all .15s; text-align: center;
}
.type-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Time row ── */
.time-row { display: flex; gap: 10px; }
.time-col { flex: 1; }
.time-col input { font-size: 13px; padding: 11px 10px; }

/* ── Suggest ── */
.suggest-wrap { position: relative; }
.suggest-list {
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 10px; overflow: hidden; margin-top: 4px;
  display: none; max-height: 190px; overflow-y: auto;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}
.suggest-list.open { display: block; }
.suggest-item {
  padding: 11px 14px; font-size: 15px;
  border-bottom: 1px solid #F2F2F7; cursor: pointer;
}
.suggest-item:last-child { border-bottom: none; }
.suggest-item:active { background: var(--panel); }

/* ── Submit ── */
.submit-btn {
  width: 100%; padding: 16px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius);
  font-size: 17px; font-weight: 700; font-family: inherit;
  cursor: pointer; margin-top: 22px; letter-spacing: .2px;
  transition: opacity .15s;
}
.submit-btn:active { opacity: .8; }

/* ── Search bar ── */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-wrap input { padding-left: 38px; background: var(--panel); border-color: var(--panel); }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); pointer-events:none; }
.search-icon svg { width:16px; height:16px; stroke:var(--muted); fill:none; stroke-width:2; stroke-linecap:round; }

/* ── City grid ── */
.city-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-bottom: 20px; }
.city-card { background:var(--panel); border-radius:12px; padding:12px; min-height:68px; }
.city-card.has-data { border: 1.5px solid var(--border); }
.city-card .c-name { font-size:13px; font-weight:600; margin-bottom:4px; }
.city-card.no-data .c-name { color:var(--muted); }
.city-card .c-info { font-size:11px; color:var(--accent); }
.city-card.no-data .c-info { color:var(--muted); }

/* ── Stats page ── */
.stats-big { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.stats-big-card { background:var(--panel); border-radius:var(--radius); padding:16px 14px; }
.stats-big-card .sv { font-size:26px; font-weight:800; color:var(--accent); }
.stats-big-card .sk { font-size:12px; color:var(--muted); margin-top:3px; }
.bar-section { margin-bottom:14px; }
.bar-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.bar-city { font-size:13px; font-weight:500; width:80px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bar-track { flex:1; height:8px; background:var(--panel); border-radius:99px; overflow:hidden; }
.bar-fill  { height:100%; background:var(--accent); border-radius:99px; transition:width .4s ease; }
.bar-val   { font-size:12px; color:var(--muted); width:44px; text-align:right; flex-shrink:0; }

/* ── Profile ── */
.profile-hero {
  display:flex; flex-direction:column; align-items:center; padding:24px 0 16px;
}
.avatar-wrap {
  width:88px; height:88px; border-radius:50%;
  background:var(--panel); overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  border:3px solid var(--border); cursor:pointer; position:relative; font-size:36px;
}
.avatar-wrap img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.avatar-hint { font-size:11px; color:var(--muted); margin-top:8px; }
.profile-name { font-size:20px; font-weight:700; margin-top:10px; color:var(--text); cursor:pointer; }
.profile-name-hint { font-size:12px; color:var(--muted); margin-top:2px; }
.profile-list { margin-top:6px; margin-bottom:14px; }
.profile-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; background:var(--panel); margin-bottom:1px; font-size:15px;
}
.profile-row:first-child { border-radius:var(--radius) var(--radius) 0 0; }
.profile-row:last-child  { border-radius:0 0 var(--radius) var(--radius); margin-bottom:0; }
.pr-val { color:var(--muted); font-size:14px; }

/* ── Modal ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.45);
  display:flex; align-items:flex-end; justify-content:center;
  z-index:100; opacity:0; pointer-events:none; transition:opacity .2s;
}
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal-sheet {
  background:var(--bg); border-radius:20px 20px 0 0;
  width:100%; max-width:480px;
  padding:20px 20px calc(20px + var(--safe-bot));
  transform:translateY(100%); transition:transform .28s cubic-bezier(.4,0,.2,1);
  max-height:88dvh; overflow-y:auto;
}
.modal-overlay.open .modal-sheet { transform:translateY(0); }
.modal-handle { width:36px; height:4px; background:#E5E5EA; border-radius:99px; margin:0 auto 16px; }
.modal-title { font-size:17px; font-weight:700; margin-bottom:4px; }
.modal-btns { display:flex; gap:10px; margin-top:20px; }
.modal-cancel { flex:1; padding:14px; border-radius:12px; border:none; background:var(--panel); color:var(--text); font-size:16px; font-weight:600; font-family:inherit; cursor:pointer; }
.modal-save   { flex:1; padding:14px; border-radius:12px; border:none; background:var(--accent); color:#fff; font-size:16px; font-weight:700; font-family:inherit; cursor:pointer; }

/* ── Toast ── */
.toast {
  position:fixed; bottom:calc(68px + var(--safe-bot) + 12px);
  left:50%; transform:translateX(-50%) translateY(12px);
  background:#1C1C1E; color:#fff; padding:10px 20px;
  border-radius:20px; font-size:14px; font-weight:500;
  opacity:0; transition:all .22s; pointer-events:none;
  white-space:nowrap; z-index:200;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.empty { text-align:center; padding:48px 0; color:var(--muted); font-size:15px; }
.empty .big { font-size:40px; margin-bottom:10px; }

/* ── View toggle ── */
.view-toggle {
  display: flex; gap: 4px; margin-bottom: 12px;
  background: var(--panel); border-radius: 10px; padding: 3px; width: fit-content;
}
.vt-btn {
  border: none; background: none; color: var(--muted);
  padding: 6px 10px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.vt-btn.active { background: var(--bg); color: var(--accent); box-shadow: 0 1px 4px rgba(0,0,0,.12); }

/* ── Cover grid view (2 col) ── */
.cover-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 4px;
}
.cover-card {
  border-radius: 12px; overflow: hidden; background: var(--panel);
  cursor: pointer; position: relative;
}
.cover-card-img {
  width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block;
  background: var(--accent2);
}
.cover-card-img-ph {
  width: 100%; aspect-ratio: 3/4; background: var(--accent2);
  display: flex; align-items: center; justify-content: center; font-size: 36px;
}
.cover-card-info {
  padding: 8px 10px 10px;
}
.cover-card-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cover-card-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cover-card-price { font-size: 12px; font-weight: 700; color: var(--accent); margin-top: 4px; }

/* ── Ticket clip view ── */
.ticket-list { display: flex; flex-direction: column; gap: 10px; }
.ticket-card {
  background: var(--panel); border-radius: 14px; overflow: hidden;
  display: flex; cursor: pointer; position: relative;
}
.ticket-card::after {
  content: ''; position: absolute; left: 90px; top: -6px; bottom: -6px;
  width: 1px; border-left: 2px dashed #D1D1D6;
}
.ticket-left {
  width: 90px; flex-shrink: 0;
  background: var(--accent2); display: flex; align-items: center; justify-content: center;
  font-size: 28px; overflow: hidden;
}
.ticket-left img { width: 100%; height: 100%; object-fit: cover; }
.ticket-right { flex: 1; padding: 12px 14px; min-width: 0; }
.ticket-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ticket-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }
.ticket-row2 { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 8px; }
.ticket-meta { font-size: 11px; color: var(--muted); }
.ticket-price { font-size: 16px; font-weight: 800; color: var(--accent); }
.ticket-type-tag {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
  background: rgba(76,175,80,.15); color: var(--accent); margin-top: 5px;
}

/* ── Detail modal ── */
.detail-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 150; opacity: 0; pointer-events: none; transition: opacity .2s;
  display: flex; align-items: flex-end; justify-content: center;
}
.detail-overlay.open { opacity: 1; pointer-events: all; }
.detail-sheet {
  background: var(--bg); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px;
  max-height: 92dvh; overflow-y: auto;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
  padding-bottom: var(--safe-bot);
}
.detail-overlay.open .detail-sheet { transform: translateY(0); }
.detail-cover-wrap { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }
.detail-cover-wrap img { width: 100%; height: 100%; object-fit: cover; }
.detail-cover-ph { width: 100%; aspect-ratio: 16/9; background: var(--accent2); display: flex; align-items: center; justify-content: center; font-size: 64px; }
.detail-close {
  position: absolute; top: 14px; right: 14px;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(0,0,0,.4); border: none; color: #fff;
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.detail-body { padding: 20px 20px 24px; }
.detail-type-tag {
  display: inline-block; font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 99px; margin-bottom: 10px;
  background: var(--accent2); color: var(--accent);
}
.detail-title  { font-size: 22px; font-weight: 800; line-height: 1.2; }
.detail-artist { font-size: 15px; color: var(--muted); margin-top: 4px; }
.detail-divider { height: 1px; background: var(--panel); margin: 16px 0; }
.detail-rows { display: flex; flex-direction: column; gap: 10px; }
.detail-row { display: flex; gap: 10px; }
.detail-icon { font-size: 16px; width: 22px; flex-shrink: 0; margin-top: 1px; }
.detail-row-content { flex: 1; }
.detail-row-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.detail-row-val   { font-size: 14px; font-weight: 600; margin-top: 1px; }
.detail-price { font-size: 28px; font-weight: 800; color: var(--accent); margin-top: 14px; }
.detail-actions { display: flex; gap: 10px; margin-top: 20px; }
.detail-edit-btn { flex: 1; padding: 14px; border-radius: 12px; border: none; background: var(--panel); color: var(--text); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
.detail-del-btn  { padding: 14px 20px; border-radius: 12px; border: none; background: #FFF0EF; color: var(--red); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }

/* ── Pie chart ── */
.pie-wrap { display: flex; align-items: center; gap: 20px; margin-bottom: 8px; padding: 16px; background: var(--panel); border-radius: var(--radius); }
.pie-legend { display: flex; flex-direction: column; gap: 10px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-label { color: var(--text); font-weight: 500; }
.legend-val { color: var(--muted); font-size: 12px; }

/* ── Topbar actions ── */
.tb-icon-btn {
  border: none; background: var(--panel); color: var(--muted);
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}
.tb-icon-btn:active { opacity: .7; }

/* view-toggle replaced by dropdown */

/* ── Sort dropdown ── */
.sort-menu {
  position: absolute; top: calc(var(--safe-top) + 52px); right: 56px;
  background: var(--bg); border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
  z-index: 50; display: none; min-width: 160px; overflow: hidden;
}
.sort-menu.open { display: block; }
.sort-item {
  padding: 13px 16px; font-size: 14px; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; color: var(--text); transition: background .1s;
  border-bottom: 1px solid var(--panel);
}
.sort-item:last-child { border-bottom: none; }
.sort-item:active { background: var(--panel); }
.sort-item.active { color: var(--accent); font-weight: 700; }

/* ── Card view (图二 style) ── */
.card-list { display: flex; flex-direction: column; gap: 12px; }
.show-card {
  border-radius: 18px; overflow: hidden; cursor: pointer;
  position: relative; min-height: 130px;
  display: flex; align-items: flex-end; padding: 0;
}
.show-card-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #4CAF50 0%, #81C784 100%);
}
.show-card-bg.type-festival { background: linear-gradient(135deg, #4DA6D9 0%, #7BC4E8 100%); }
.show-card-bg.type-concert  { background: linear-gradient(135deg, #9B7ED9 0%, #C3A6E8 100%); }
.show-card-cover {
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  width: 82px; height: 104px; border-radius: 10px;
  overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,.3);
  background: rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center; font-size: 32px;
  flex-shrink: 0;
}
.show-card-cover img { width:100%; height:100%; object-fit:cover; }
.show-card-body {
  position: relative; flex: 1;
  padding: 16px 16px 14px 114px; min-width: 0;
}
.show-card-title {
  font-size: 16px; font-weight: 800; color: #fff;
  line-height: 1.3; margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.show-card-info-row {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: rgba(255,255,255,.9); margin-bottom: 4px;
}
.show-card-info-row svg { flex-shrink: 0; opacity: .85; }
.show-card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 10px;
}
.show-card-ago {
  background: rgba(0,0,0,.18); color: rgba(255,255,255,.9);
  font-size: 12px; font-weight: 600;
  padding: 4px 12px; border-radius: 99px;
}
.show-card-menu {
  background: rgba(0,0,0,.18); color: rgba(255,255,255,.9);
  border: none; width: 32px; height: 32px; border-radius: 50%;
  font-size: 14px; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; justify-content: center;
  letter-spacing: 1px;
}

/* ── Topbar actions ── */
.topbar-actions { display:flex; align-items:center; gap:8px; }

/* ── Filter chips ── */
.filter-scroll {
  display: flex; gap: 7px; overflow-x: auto; padding-bottom: 8px;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
  flex-shrink: 0;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; border: none; border-radius: 99px;
  padding: 5px 13px; font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  background: var(--panel); color: var(--muted);
  transition: all .15s;
}
.chip.active { background: var(--accent); color: #fff; }

/* ── Search overlay ── */
.search-overlay {
  position: fixed; inset: 0; background: var(--bg);
  z-index: 200; display: flex; flex-direction: column;
  padding-top: var(--safe-top);
  transform: translateY(-100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.search-overlay.open { transform: translateY(0); }
.search-bar-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-bottom: 1px solid var(--panel);
}
.search-bar-input {
  flex: 1; border: none; outline: none;
  font-size: 16px; font-family: inherit; color: var(--text);
  background: transparent;
}
.search-cancel {
  border: none; background: none; color: var(--accent);
  font-size: 15px; font-weight: 600; font-family: inherit;
  cursor: pointer; white-space: nowrap; padding: 4px;
}
.search-results {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  -webkit-overflow-scrolling: touch;
}
.search-hint { text-align:center; padding:48px 0; color:var(--muted); font-size:14px; }

/* ── View trigger button (capsule: list icon + chevron) ── */
.view-trigger-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--panel); border: none;
  border-radius: 10px; padding: 7px 11px;
  cursor: pointer; color: var(--muted);
  transition: all .15s;
}
.view-trigger-btn.menu-open { background: var(--accent2); color: var(--accent); }
.view-trigger-btn.menu-open #view-trigger-arrow { transform: rotate(180deg); }
#view-trigger-arrow { transition: transform .2s ease; }

/* ── View dropdown ── */
.view-dropdown {
  position: absolute;
  top: calc(var(--safe-top) + 52px);
  right: 16px;
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 10px 44px rgba(0,0,0,.15), 0 2px 8px rgba(0,0,0,.06);
  z-index: 60;
  width: 72px;
  padding: 10px 0;
  opacity: 0;
  pointer-events: none;
  transform: scale(.88) translateY(-10px);
  transform-origin: top right;
  transition: opacity .18s ease, transform .2s cubic-bezier(.34,1.56,.64,1);
}
.view-dropdown.open {
  opacity: 1;
  pointer-events: all;
  transform: scale(1) translateY(0);
}
.view-option {
  display: flex; align-items: center; justify-content: center;
  width: 100%; padding: 14px 0;
  border: none; background: none; cursor: pointer;
  color: #9E9E9E;
  transition: color .15s;
}
.view-option:active { background: var(--panel); }
.view-option.active { color: var(--accent); }
.view-option svg { display: block; }

/* ── Calendar view ── */
.cal-group { margin-bottom: 20px; }
.cal-month-label {
  font-size: 13px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: 12px; padding-left: 2px;
}
.cal-item {
  display: flex; align-items: flex-start; gap: 0;
  margin-bottom: 10px;
}
.cal-date-col {
  width: 38px; flex-shrink: 0; text-align: center; padding-top: 4px;
}
.cal-day  { font-size: 18px; font-weight: 800; color: var(--text); line-height: 1; }
.cal-wd   { font-size: 11px; color: var(--muted); margin-top: 2px; }
.cal-dot-col {
  width: 28px; flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; padding-top: 10px;
}
.cal-dot  { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.cal-line { width: 2px; flex: 1; min-height: 40px; background: var(--border); margin-top: 4px; }
.cal-info-col { flex: 1; padding-bottom: 10px; }
.cal-card {
  background: var(--panel); border-radius: 12px;
  display: flex; gap: 10px; padding: 11px 12px;
  cursor: pointer; align-items: center;
}
.cal-card-cover {
  width: 42px; height: 42px; border-radius: 8px; flex-shrink: 0;
  background: var(--accent2); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.cal-card-body { flex: 1; min-width: 0; }
.cal-card-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-card-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar" id="main-topbar">
  <div class="topbar-title">Record</div>
  <div class="topbar-actions" id="topbar-actions">
    <button class="tb-icon-btn" onclick="openSearch()" title="搜索">
      <svg viewBox="0 0 20 20" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg>
    </button>
    <button class="view-trigger-btn" id="view-toggle-btn" onclick="toggleViewMenu()" title="切换视图">
      <svg id="view-trigger-list-icon" viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="2" y1="5" x2="10" y2="5"/><circle cx="13.5" cy="5" r="1.5" fill="currentColor" stroke="none"/>
        <line x1="2" y1="10" x2="10" y2="10"/><circle cx="13.5" cy="10" r="1.5" fill="currentColor" stroke="none"/>
        <line x1="2" y1="15" x2="10" y2="15"/><circle cx="13.5" cy="15" r="1.5" fill="currentColor" stroke="none"/>
      </svg>
      <svg id="view-trigger-arrow" viewBox="0 0 10 10" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="2,7 5,3 8,7"/>
      </svg>
    </button>
  </div>
</div>

<!-- View dropdown menu -->
<div class="view-dropdown" id="view-dropdown">
  <!-- 1: card list (thumbnail left + lines right) -->
  <div class="view-option active" id="vopt-card" data-view="card">
    <svg viewBox="0 0 32 32" width="32" height="32" fill="none">
      <!-- row 1: small thumbnail box + two lines -->
      <rect x="2" y="3" width="9" height="9" rx="1.5" fill="currentColor" opacity=".55"/>
      <rect x="13" y="4.5" width="17" height="2.5" rx="1.2" fill="currentColor"/>
      <rect x="13" y="9" width="12" height="2" rx="1" fill="currentColor" opacity=".4"/>
      <!-- row 2 -->
      <rect x="2" y="15" width="9" height="9" rx="1.5" fill="currentColor" opacity=".55"/>
      <rect x="13" y="16.5" width="17" height="2.5" rx="1.2" fill="currentColor"/>
      <rect x="13" y="21" width="12" height="2" rx="1" fill="currentColor" opacity=".4"/>
    </svg>
  </div>
  <!-- 2: cover grid (2×2 tall poster cards) -->
  <div class="view-option" id="vopt-cover" data-view="cover">
    <svg viewBox="0 0 32 32" width="32" height="32" fill="none">
      <rect x="1" y="1" width="13" height="18" rx="2" fill="currentColor" opacity=".55"/>
      <rect x="18" y="1" width="13" height="18" rx="2" fill="currentColor" opacity=".55"/>
      <rect x="1" y="22" width="13" height="9" rx="1.5" fill="currentColor" opacity=".25"/>
      <rect x="18" y="22" width="13" height="9" rx="1.5" fill="currentColor" opacity=".25"/>
    </svg>
  </div>
  <!-- 3: ticket stub -->
  <div class="view-option" id="vopt-ticket" data-view="ticket">
    <svg viewBox="0 0 32 32" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <rect x="2" y="7" width="28" height="18" rx="3"/>
      <path d="M10 7V5.5a3.5 3.5 0 0 1 7 0V7"/>
      <path d="M10 25v1.5a3.5 3.5 0 0 0 7 0V25"/>
      <line x1="2"  y1="13" x2="4.5" y2="13"/>
      <line x1="27.5" y1="13" x2="30" y2="13"/>
      <line x1="2"  y1="19" x2="4.5" y2="19"/>
      <line x1="27.5" y1="19" x2="30" y2="19"/>
    </svg>
  </div>
  <!-- 4: calendar -->
  <div class="view-option" id="vopt-cal" data-view="cal">
    <svg viewBox="0 0 32 32" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <rect x="3" y="5" width="26" height="23" rx="3"/>
      <line x1="9"  y1="2" x2="9"  y2="7"/>
      <line x1="23" y1="2" x2="23" y2="7"/>
      <line x1="3"  y1="13" x2="29" y2="13"/>
      <rect x="8" y="17" width="5" height="5" rx="1.2" fill="currentColor" opacity=".5" stroke="none"/>
      <rect x="17" y="17" width="5" height="5" rx="1.2" fill="currentColor" opacity=".25" stroke="none"/>
    </svg>
  </div>
</div>

<div class="screens">

  <!-- ① 演出 -->
  <div class="screen active" id="screen-dash">
    <div class="filter-scroll" id="year-filter"></div>
    <div class="filter-scroll" id="type-filter">
      <button class="chip active" data-type="all" onclick="setTypeFilter('all',this)">全部</button>
      <button class="chip" data-type="Live House" onclick="setTypeFilter('Live House',this)">Live House</button>
      <button class="chip" data-type="音乐节" onclick="setTypeFilter('音乐节',this)">音乐节</button>
      <button class="chip" data-type="演唱会" onclick="setTypeFilter('演唱会',this)">演唱会</button>
    </div>
    <div id="dash-list"></div>
    <div class="pb"></div>
  </div>

  <!-- ② 地图 -->
  <div class="screen" id="screen-city">
    <div class="search-wrap">
      <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input type="text" id="city-search" placeholder="搜索城市..." oninput="renderCityMap()">
    </div>
    <div class="city-grid" id="city-grid"></div>
  </div>

  <!-- ③ 添加 -->
  <div class="screen" id="screen-add">

    <!-- 封面（左）+ 演出名 & 艺人（右） -->
    <div class="add-hero">
      <div style="width:140px;flex-shrink:0;position:relative;height:186px;border-radius:12px;overflow:hidden;background:#F2F2F7;cursor:pointer;" onclick="document.getElementById('cover-file').click()">
        <!-- 占位内容 -->
        <div id="cover-ph-box" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;">
          <svg viewBox="0 0 24 24" width="32" height="32" stroke="#C7C7CC" fill="none" stroke-width="1.5" stroke-linecap="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span style="font-size:11px;font-weight:600;color:#C7C7CC;">选封面</span>
        </div>
        <!-- 预览图 -->
        <img id="cover-preview" alt="" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
        <!-- 隐藏input -->
        <input type="file" id="cover-file" accept="image/*" style="display:none;" onchange="onCoverPick(event)">
      </div>
      <div class="hero-fields">
        <div class="hero-field-label">演出名称</div>
        <input type="text" id="show-name" class="show-name-input" placeholder="请输入演出名称">
        <div class="hero-field-label">艺人</div>
        <input type="text" id="artist-input" class="artist-hero-input" placeholder="请输入艺人">
      </div>
    </div>

    <!-- 演出类型 -->
    <div class="field-label">演出类型</div>
    <div class="type-row">
      <button class="type-btn active" data-type="Live House" onclick="setType(this)">Live House</button>
      <button class="type-btn" data-type="音乐节" onclick="setType(this)">音乐节</button>
      <button class="type-btn" data-type="演唱会" onclick="setType(this)">演唱会</button>
    </div>

    <!-- 时间 -->
    <div class="time-row">
      <div class="time-col">
        <div class="field-label">开始时间</div>
        <input type="datetime-local" id="start-time">
      </div>
      <div class="time-col">
        <div class="field-label">结束时间</div>
        <input type="datetime-local" id="end-time">
      </div>
    </div>

    <!-- 城市 -->
    <div class="field-label">城市</div>
    <div class="suggest-wrap">
      <input type="text" id="city-input" placeholder="搜索城市..." autocomplete="off" oninput="onCityType(this.value,'suggest-list')">
      <div class="suggest-list" id="suggest-list"></div>
    </div>

    <!-- 演出场馆 -->
    <div class="field-label">演出场馆</div>
    <input type="text" id="venue-input" placeholder="场馆名称">

    <!-- 票价 -->
    <div class="field-label">票价（元）</div>
    <input type="number" id="price-input" placeholder="例如：399" inputmode="decimal" step="0.01">

    <!-- 座位 -->
    <div class="field-label">座位</div>
    <input type="text" id="seat-input" placeholder="例如：A区 18排 22号">

    <!-- 备注 -->
    <div class="field-label">备注（可选）</div>
    <textarea id="note-input" placeholder="备注..."></textarea>

    <button class="submit-btn" onclick="addRecord()">添加演出记录</button>
    <div class="pb"></div>
  </div>

  <!-- ④ 统计 -->
  <div class="screen" id="screen-stats">
    <div class="stats-big" id="stats-big"></div>
    <div class="section-label">演出类型分布</div>
    <div class="pie-wrap">
      <canvas id="pie-canvas" width="180" height="180"></canvas>
      <div class="pie-legend" id="pie-legend"></div>
    </div>
    <div class="section-label" style="margin-top:14px">城市演出排行</div>
    <div class="bar-section" id="bar-section"></div>
    <div class="pb"></div>
  </div>

  <!-- ⑤ 我的 -->
  <div class="screen" id="screen-me">
    <div class="profile-hero">
      <div class="avatar-wrap" onclick="document.getElementById('avatar-file').click()">
        <span id="avatar-emoji">🙂</span>
        <img id="avatar-img" src="" style="display:none">
      </div>
      <div class="avatar-hint">点击更换头像</div>
      <div class="profile-name" id="profile-name" onclick="editName()">点击设置昵称</div>
      <div class="profile-name-hint">点击修改昵称</div>
    </div>
    <input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="onAvatarPick(event)">
    <div class="profile-list">
      <div class="profile-row"><span>演出总数</span><span class="pr-val" id="me-total">0</span></div>
      <div class="profile-row"><span>覆盖城市</span><span class="pr-val" id="me-cities">0</span></div>
      <div class="profile-row"><span>最早记录</span><span class="pr-val" id="me-earliest">—</span></div>
      <div class="profile-row"><span>最新记录</span><span class="pr-val" id="me-latest">—</span></div>
    </div>
    <div class="profile-list">
      <div class="profile-row" onclick="exportCSV()" style="cursor:pointer"><span>⬇ 导出 CSV</span><span style="color:var(--muted)">›</span></div>
      <div class="profile-row" onclick="clearAll()" style="cursor:pointer;color:var(--red)"><span>🗑 清空所有记录</span><span>›</span></div>
    </div>
    <div class="pb"></div>
  </div>

</div>

<!-- Navbar -->
<nav class="navbar">
  <button class="nav-btn active" id="nav-dash" onclick="goTo('dash',this)">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" width="24" height="24">
        <!-- ticket body -->
        <rect x="1.5" y="6" width="21" height="12" rx="2.5"
              fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <!-- ♪ music note as text, centered in ticket -->
        <text x="12" y="15.5"
              font-size="8" text-anchor="middle"
              font-family="-apple-system,sans-serif"
              fill="currentColor" stroke="none">♪</text>
      </svg>
    </div>
    <span>演出</span>
  </button>
  <button class="nav-btn" id="nav-city" onclick="goTo('city',this)">
    <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
    <span>地图</span>
  </button>
  <button class="nav-btn add-btn" id="nav-add" onclick="goTo('add',this)">
    <div class="nav-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    <span>添加</span>
  </button>
  <button class="nav-btn" id="nav-stats" onclick="goTo('stats',this)">
    <div class="nav-icon"><svg viewBox="0 0 24 24" width="24" height="24">
        <!-- 3/4 base arc fill -->
        <path d="M12 12 L12 2 A10 10 0 1 0 22 12 Z" fill="currentColor" opacity="0.35" stroke="none"/>
        <!-- 1/4 highlighted slice (top-right, lifted) -->
        <g transform="translate(1.5,-1.5)">
          <path d="M12 12 L22 12 A10 10 0 0 0 12 2 Z" fill="currentColor" stroke="none"/>
        </g>
      </svg></div>
    <span>统计</span>
  </button>
  <button class="nav-btn" id="nav-me" onclick="goTo('me',this)">
    <div class="nav-icon"><div class="nav-avatar" id="nav-avatar">
      <img id="nav-av-img" src="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%">
      <span id="nav-av-emoji">🙂</span>
    </div></div>
    <span>我的</span>
  </button>
</nav>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" onclick="closeEditOnBg(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">编辑演出记录</div>

    <!-- 封面（左）+ 演出名 & 艺人（右） -->
    <div class="add-hero" style="margin-top:12px">
      <div class="cover-pick">
        <input type="file" id="edit-cover-file" accept="image/*" onchange="onEditCoverPick(event)">
        <div class="cover-img-wrap"><img id="edit-cover-preview" alt=""></div>
        <div class="cover-ph" id="edit-cover-ph">
          <svg viewBox="0 0 24 24" width="26" height="26" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>封面</span>
        </div>
      </div>
      <div class="hero-fields">

function buildRecRow(r) {

// ── Swipe ───────────────────────────────────────────────────────────────────
function attachSwipe(el) {
  el.querySelectorAll('.rec-row').forEach(row => {
    let sx=0, sy=0;
    row.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
    row.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-sx, dy=Math.abs(e.touches[0].clientY-sy);
      if(dy>12) return;
      const w=row.closest('.rec-wrap');
      if(dx<-30){ document.querySelectorAll('.rec-wrap.swiped').forEach(x=>{if(x!==w)x.classList.remove('swiped');}); w.classList.add('swiped'); }
      else if(dx>20){ w.classList.remove('swiped'); }
    },{passive:true});
  });
}
document.addEventListener('touchstart',e=>{ if(!e.target.closest('.rec-wrap')) document.querySelectorAll('.rec-wrap.swiped').forEach(w=>w.classList.remove('swiped')); },{passive:true});

function getSorted() {
  let s=[...records];
  if(filterYear!=='all') s=s.filter(r=>(r.date||r.start||'').slice(0,4)===filterYear);
  if(filterType!=='all') s=s.filter(r=>r.type===filterType);
  s.sort((a,b)=>b.date.localeCompare(a.date));
  return s;
}

function daysAgo(dateStr) {
  if(!dateStr) return null;
  const d = new Date(dateStr); const now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if(diff < 0) return '即将到来';
  if(diff === 0) return '今天';
  return '已过去 ' + diff + ' 天';
}

      : r.date;

function renderCalView(sorted) {
  // Group by year-month
  const groups = {};
  sorted.forEach(r=>{
    const key = (r.date||r.start||'').slice(0,7);
    if(!key) return;
    if(!groups[key]) groups[key]=[];
    groups[key].push(r);
  });
  const months = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  if(!months.length) return '<div class="empty"><div class="big">📅</div>暂无演出记录</div>';
  return months.map(m=>{
    const [y,mo] = m.split('-');
    const label = y+'年'+parseInt(mo)+'月';
    const items = groups[m].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    return `<div class="cal-group">
      <div class="cal-month-label">${label}</div>
      ${items.map(r=>{
        const d = new Date(r.start||r.date);
        const day = d.getDate();
        const weekdays=['日','一','二','三','四','五','六'];
        const wd = weekdays[d.getDay()];
        const timeStr = r.start ? String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0') : '';
        const coverContent = r.cover?`<img src="${r.cover}" style="width:100%;height:100%;object-fit:cover;border-radius:7px">`:`<span style="font-size:20px">${typeEmoji(r.type)}</span>`;
        return `<div class="cal-item" onclick="openDetail(${r.id})">
          <div class="cal-date-col">
            <div class="cal-day">${day}</div>
            <div class="cal-wd">周${wd}</div>
          </div>
          <div class="cal-dot-col"><div class="cal-dot"></div><div class="cal-line"></div></div>
          <div class="cal-info-col">
            <div class="cal-card">
              <div class="cal-card-cover">${coverContent}</div>
              <div class="cal-card-body">
                <div class="cal-card-title">${r.name||'未命名'}</div>
                <div class="cal-card-sub">${[r.city,r.venue].filter(Boolean).join(' · ')}${timeStr?' · '+timeStr:''}</div>
                ${r.type?`<span class="ticket-type-tag">${r.type}</span>`:''}
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const total=records.length;
  const totalSpend=records.reduce((s,r)=>s+r.price,0);
  const cities=new Set(records.map(r=>r.city)).size;
  const avg=total?totalSpend/total:0;
  document.getElementById('stats-big').innerHTML=`
    <div class="stats-big-card"><div class="sv">${total}</div><div class="sk">演出总数</div></div>
    <div class="stats-big-card"><div class="sv">${cities}</div><div class="sk">覆盖城市</div></div>
    <div class="stats-big-card"><div class="sv">¥${totalSpend.toFixed(0)}</div><div class="sk">总花费</div></div>
    <div class="stats-big-card"><div class="sv">¥${avg.toFixed(0)}</div><div class="sk">场均票价</div></div>
  `;
  // pie chart
  const PIE_COLORS = {'Live House':'#4CAF50','音乐节':'#FF9500','演唱会':'#007AFF'};
  const tc={'Live House':0,'音乐节':0,'演唱会':0};
  records.forEach(r=>{ if(tc[r.type]!==undefined) tc[r.type]++; });
  const pieData = Object.entries(tc).filter(([,v])=>v>0);
  const pieTotal = pieData.reduce((s,[,v])=>s+v,0)||1;
  const canvas = document.getElementById('pie-canvas');
  const ctx = canvas.getContext('2d');
  const cx=90, cy=90, r=78, ir=44;
  ctx.clearRect(0,0,180,180);
  let startAngle = -Math.PI/2;
  pieData.forEach(([label,val])=>{
    const sweep = (val/pieTotal)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,startAngle,startAngle+sweep);
    ctx.closePath();
    ctx.fillStyle = PIE_COLORS[label]||'#ccc';
    ctx.fill();
    startAngle += sweep;
  });
  // donut hole
  ctx.beginPath(); ctx.arc(cx,cy,ir,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  // center text
  ctx.fillStyle='#1C1C1E'; ctx.textAlign='center';
  ctx.font='bold 22px -apple-system,sans-serif'; ctx.fillText(total,cx,cy+4);
  ctx.fillStyle='#8E8E93'; ctx.font='11px -apple-system,sans-serif'; ctx.fillText('场',cx,cy+18);
  // legend
  document.getElementById('pie-legend').innerHTML = Object.entries(PIE_COLORS).map(([t,col])=>{
    const cnt = tc[t]||0;
    const pct = total ? Math.round(cnt/total*100) : 0;
    return `<div class="legend-item"><div class="legend-dot" style="background:${col}"></div><div><div class="legend-label">${t} <span style="font-weight:700">${cnt}场</span></div><div class="legend-val">${pct}%</div></div></div>`;
  }).join('');
  // city bar
  const cc={}; records.forEach(r=>cc[r.city]=(cc[r.city]||0)+1);
  const sc=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const mc=sc[0]?.[1]||1;
  document.getElementById('bar-section').innerHTML=sc.map(([city,cnt])=>`
    <div class="bar-row"><div class="bar-city">${city}</div><div class="bar-track"><div class="bar-fill" style="width:${cnt/mc*100}%"></div></div><div class="bar-val">${cnt}场</div></div>`).join('')||'<div style="color:var(--muted);font-size:14px;padding:4px">暂无数据</div>';
}

// ── Search ────────────────────────────────────────────────────────────────────
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('search-input').focus(), 200);
}
function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';

function doSearch(q) {
  const el = document.getElementById('search-results');
  if(!q.trim()){ el.innerHTML='<div class="search-hint">输入关键词开始搜索</div>'; return; }
  const kw = q.toLowerCase();
  const hits = records.filter(r=>
    (r.name||'').toLowerCase().includes(kw) ||
    (r.artist||'').toLowerCase().includes(kw) ||
    (r.city||'').toLowerCase().includes(kw) ||
    (r.venue||'').toLowerCase().includes(kw)
  );
  if(!hits.length){ el.innerHTML='<div class="search-hint">没有找到匹配的演出</div>'; return; }
  el.innerHTML = '<div class="card-list">' + hits.map(r=>{
    const TYPE_CLASS={'音乐节':'type-festival','演唱会':'type-concert'};
    const bgClass=TYPE_CLASS[r.type]||'';
    const coverContent=r.cover?`<img src="${r.cover}">`:`<span style="font-size:28px">${typeEmoji(r.type)}</span>`;
    const timeStr=r.start?(()=>{const d=new Date(r.start);return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');})():r.date;
    const ago=daysAgo(r.start?r.start.slice(0,10):r.date);
    return `<div class="show-card" onclick="closeSearch();openDetail(${r.id})">
      <div class="show-card-bg ${bgClass}"></div>
      <div class="show-card-cover">${coverContent}</div>
      <div class="show-card-body">
        <div class="show-card-title">${r.name||'未命名'}</div>
        <div class="show-card-info-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${timeStr}</div>
        <div class="show-card-info-row"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>${[r.city,r.venue].filter(Boolean).join(' · ')}</div>
        <div class="show-card-footer"><span class="show-card-ago">${ago||''}</span></div>
      </div>
    </div>`;
  }).join('') + '</div>';
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderDash();
if(profile.avatar) setAvatarImg(profile.avatar);
if(profile.name)   document.getElementById('profile-name').textContent=profile.name;
</script>
